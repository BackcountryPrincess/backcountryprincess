name: Build dist.zip (Vite)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        working-directory: src
        run: npm install

      - name: Build
        working-directory: src
        run: npm run build

      # Create dist.zip from the contents of src/dist (no nested dist folder)
      - name: Create dist.zip
        working-directory: src/dist
        run: |
          rm -f ../../dist.zip
          zip -r ../../dist.zip .

      - name: Upload dist.zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-zip
          path: dist.zip
