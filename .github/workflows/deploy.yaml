name: Deploy to GreenGeeks

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: src
        run: npm install

      - name: Build
        working-directory: src
        run: npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GREENGEEKS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 22 mtl201.greengeeks.net >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            --exclude 'patreon/' \
            -e "ssh -i ~/.ssh/deploy_key -p 22" \
            src/dist/ \
            va2omg7uajaq@mtl201.greengeeks.net:/home/va2omg7uajaq/public_html/maple.backcountryprincess.com/
