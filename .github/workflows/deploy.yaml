name: Deploy to GreenGeeks

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to GreenGeeks via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: mtl201.greengeeks.net
          username: va2omg7uajaq
          key: ${{ secrets.GREENGEEKS_SSH_KEY }}
          source: "dist/*"
          target: /home/va2omg7uajaq/public_html/maple.backcountryprincess.com/
          strip_components: 1
          rm: false
